# ── Development ───────────────────────────────────────────────────────────────
[build]
target = "x86_64-pc-windows-msvc"

# Force safe baseline + explicitly disable everything newer than SSE4.2
rustflags = [
    "-C", "target-cpu=x86-64-v2",
    "-C", "target-feature=-avx,-avx2,-fma,-avx512f,-avx512vl,-avx512bw,-avx512dq,-avx512cd,-avx512vbmi,-avx512ifma"
]

# Important: Disable advanced kernels in tract-linalg
[env]
TRACT_LINALG_CPU = "x86_64"          # force generic x86_64
TRACT_DISABLE_FMA = "1"              # disable FMA
TRACT_DISABLE_AVX2 = "1"             # disable AVX2
TRACT_DISABLE_AVX512 = "1"           # disable AVX512

# ── Linker (Windows) ──────────────────────────────────────────────────────────
[target.x86_64-pc-windows-msvc]
linker = "rust-lld"

# ── Dev profile ───────────────────────────────────────────────────────────────
[profile.dev]
split-debuginfo = "unpacked"
opt-level = 0          # Use 0 while debugging the illegal instruction issue
debug = true

# ── Release profile (you can tune later) ─────────────────────────────────────
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"

