[workspace]
members = [
    "intelligence_core",
    "vision_engine",
    "intelligence_py"
]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1.20"
rayon = "1.11"
ndarray = "0.15"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"